# =============================================
# HYPRLAND CONFIGURATION FILE
# This file defines window, tag, and layer rules
# for customizing behavior, appearance, and layout.
# =============================================

### WINDOW RULES
# Window rules allow you to customize properties (floating, opacity, size, animations, etc.)
# for applications based on their `appid` or `title`.
# Format: windowrule=Parameter:Values,Parameter:Values,...

# --- State & Behavior ---
# Force a window to be floating (e.g., for dialogs or tools)
windowrule=isfloating:1,appid:pavucontrol

# Force a window to open in fullscreen mode
windowrule=isfullscreen:1,appid:mpv

# Force a window to open in fake-fullscreen (constrained to monitor)
windowrule=isfakefullscreen:1,appid:firefox

# Open a window as a global sticky window (visible across all tags)
windowrule=isglobal:1,appid:discord

# Make a window always appear on top (overlay)
windowrule=isoverlay:1,appid:flameshot

# Open a window without stealing focus
windowrule=isopensilent:1,appid:obs

# Ignore maximize/minimize requests from the client
windowrule=ignore_maximize:1,ignore_minimize:1,appid:steam

# Force a window to think it is tiled (better adheres to dimensions)
windowrule=force_tiled_state:1,appid:alacritty

# Prevent a window from opening in maximized mode
windowrule=noopenmaximized:1,appid:thunderbird

# Only allow one instance of a named scratchpad
windowrule=single_scratchpad:1,appid:st-yazi

# Allow shortcuts to be inhibited by the client
windowrule=allow_shortcuts_inhibit:1,appid:firefox

# Keep idle inhibit active when this window is focused
windowrule=idleinhibit_when_focus:1,appid:vlc


# --- Geometry & Position ---
# Set a fixed width and height for a floating window (in pixels)
windowrule=width:800,height:600,appid:calculator

# Set a window to occupy 50% of the screen width and height
windowrule=width:0.5,height:0.5,appid:geany

# Offset a window from the center of the screen (percentage)
windowrule=offsetx:20,offsety:-10,appid:spotify

# Assign a window to a specific monitor (by name)
windowrule=monitor:eDP-1,appid:signal-desktop

# Assign a window to a specific tag (1-9)
windowrule=tags:3,appid:telegram-desktop

# Prevent a window from being forced to the center
windowrule=no_force_center:1,appid:gimp

# Ignore size hints (min/max size) for a window
windowrule=isnosizehint:1,appid:blender


# --- Visuals & Decoration ---
# Disable blur effect for a window
windowrule=noblur:1,appid:slurp

# Remove the window border
windowrule=isnoborder:1,appid:rofi

# Disable shadow for a window
windowrule=isnoshadow:1,appid:picom

# Disable rounded corners for a window
windowrule=isnoradius:1,appid:obs

# Disable animations for a window
windowrule=isnoanimation:1,appid:pavucontrol

# Set opacity for focused and unfocused states
windowrule=focused_opacity:0.9,unfocused_opacity:0.7,appid:firefox

# Allow client-side decorations (CSD)
windowrule=allow_csd:1,appid:nautilus


# --- Layout & Scroller ---
# Set scroller proportion for a window
windowrule=scroller_proportion:0.8,appid:ranger

# Set scroller proportion for single-window mode
windowrule=scroller_proportion_single:0.9,appid:thunar


# --- Animation ---
# Set open/close animations for a window
windowrule=animation_type_open:zoom,animation_type_close:fade,appid:kitty

# Disable fade-in animation for a window
windowrule=nofadein:1,appid:foot

# Disable fade-out animation for a window
windowrule=nofadeout:1,appid:urxvt


# --- Terminal & Swallowing ---
# Enable terminal swallowing (replace terminal with GUI app)
windowrule=isterm:1,appid:st

# Prevent a window from being swallowed
windowrule=noswallow:1,appid:htop


# --- Global & Special Windows ---
# Assign a global keybinding to a window (Wayland apps only)
windowrule=globalkeybinding:ctrl+alt+o,appid:com.obsproject.Studio

# Open as an unmanaged global window (e.g., for desktop pets)
windowrule=isunglobal:1,appid:cheese

# Enable named scratchpad for a window
windowrule=isnamedscratchpad:1,appid:st-yazi


# --- Performance & Tearing ---
# Force tearing for a window (useful for games)
windowrule=force_tearing:1,appid:vkcube

### TAG RULES
# Tag rules allow you to customize behavior for specific tags.
# Format: tagrule=id:Values,Parameter:Values,...

# Set a layout for tag 1
tagrule=id:1,layout_name:scroller

# Set a layout for tag 2 on monitor "eDP-1"
tagrule=id:2,monitor_name:eDP-1,layout_name:tile

# Make tag 3 persistent (never hide, even if empty)
tagrule=id:3,no_hide:1,layout_name:monocle

# Set master layout settings for tag 4
tagrule=id:4,layout_name:tile,nmaster:2,mfact:0.6

# Disable border rendering for tag 5
tagrule=id:5,no_render_border:1,layout_name:dwindle

# Open new windows as floating on tag 6
tagrule=id:6,open_as_floating:1,layout_name:floating

# Assign tag 7 to monitor "HDMI-A-1" with a specific layout
tagrule=id:7,monitor_name:HDMI-A-1,layout_name:spiral


### LAYER RULES
# Layer rules allow you to customize behavior for layer shell surfaces
# (e.g., status bars, launchers, notification daemons).
# Format: layerrule=layer_name:Values,Parameter:Values,...

# Disable blur and animations for the selection layer (e.g., slurp)
layerrule=noanim:1,noblur:1,layer_name:selection

# Use zoom animation for Rofi
layerrule=animation_type_open:zoom,noanim:0,layer_name:rofi

# Disable animations and shadows for swaync (notification daemon)
layerrule=noanim:1,noshadow:1,layer_name:swaync

# Use slide animation for opening and fade for closing wofi
layerrule=animation_type_open:slide,animation_type_close:fade,noblur:1,layer_name:wofi

# Disable blur for waybar
layerrule=noblur:1,layer_name:waybar

### EXAMPLE KEYBINDINGS FOR SCRATCHPAD
# Toggle a named scratchpad (e.g., for a file manager)
# Format: bind=MOD,key,command,appid,class,command_to_run
bind=alt,h,toggle_named_scratchpad,st-yazi,none,st -c st-yazi -e yazi
