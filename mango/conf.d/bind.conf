# Keyboard and Mouse Bindings

# Core Keybindings
bind=SUPER,r,reload_config
bind=Alt,q,killclient
bind=SUPER+SHIFT,q,quit

# Launcher Keybindings
bind=Alt,Return,spawn,kitty
bind=Alt,D,spawn,fuzzel

#screenshot
bind=SUPER+SHIFT,s,spawn,flameshot gui

# Workspace Navigation (Alt+Number)
bind=Alt,1,view,1,0
bind=Alt,2,view,2,0
bind=Alt,3,view,3,0
bind=Alt,4,view,4,0
bind=Alt,5,view,5,0
bind=Alt,6,view,6,0
bind=Alt,7,view,7,0
bind=Alt,8,view,8,0
bind=Alt,9,view,9,0

# Move Window to Workspace (Alt+Shift+Number)
bind=Alt+SHIFT,1,tag,1
bind=Alt+SHIFT,2,tag,2
bind=Alt+SHIFT,3,tag,3
bind=Alt+SHIFT,4,tag,4
bind=Alt+SHIFT,5,tag,5
bind=Alt+SHIFT,6,tag,6
bind=Alt+SHIFT,7,tag,7
bind=Alt+SHIFT,8,tag,8
bind=Alt+SHIFT,9,tag,9
bind=Alt+SHIFT,0,tag,10

# Window Focus and Navigation
bind=Alt,Left,focusdir,left
bind=Alt,Right,focusdir,right
bind=Alt,Up,focusdir,up
bind=Alt,Down,focusdir,down

# Window Management
bind=SUPER,f,togglefullscreen

# Layout Management
bind=SUPER,1,setlayout,scroller
bind=SUPER,2,setlayout,fair
bind=SUPER,3,setlayout,vertical_scroller

# Media and Control
bind=Alt,space,spawn,playerctl play-pause

# Mouse Bindings
mousebind=Alt,btn_left,moveresize,curmove
mousebind=Alt,btn_right,moveresize,curresize
mousebind=Alt,btn_middle,togglefloating
