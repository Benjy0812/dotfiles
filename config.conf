# --- Core Actions ---
# Reload config
bind=SUPER,r,reload_config

# Exit/Close
bind=Alt,q,killclient
bind=SUPER+SHIFT,q,quit

# --- Launchers ---
# Terminal launcher (Kitty)
bind=Alt,Return,spawn,kitty
# App launcher (Fuzzel)
bind=Alt,D,spawn,fuzzel

# --- Window Management ---
# Focus movement with SUPER + Arrow keys
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# --- Appearance ---
# Window border thickness (1px minimal clean look)
borderpx=2

# Inner spacing between windows (0 = tight tiling layout)
gappih=0
gappiv=0

# Window corner rounding (0 = sharp, modern flat look)
border_radius=0
# 0=all 1=left 2=top 3=right 4=bottom
border_radius_location_default=0

# Outer spacing from screen edges (0 = full-screen utilization)
gappoh=0
gappov=0

# --- Blur / Transparency Effects ---
# Enable/disable frosted glass blur effect
blur = 1

# Apply blur to layer surfaces (panels, bars, docks)
blur_layer = 1

# Performance optimization for blur (keep enabled for smoothness)
blur_optimized = 1

# Blur strength (higher = more frosted look)
blur_params_radius = 8

# Smoothness of blur (more passes = cleaner but heavier)
blur_params_num_passes = 2

# Grain added to blur (subtle texture, prevents flat look)
blur_params_noise = 0.02

# Brightness adjustment of blurred background
blur_params_brightness = 0.9

# Contrast adjustment of blurred background
blur_params_contrast = 0.9

# Color intensity of blurred background
blur_params_saturation = 1.2

# --- Workspaces ---
# Move window to workspace
bind=Alt+SHIFT,1,tag,1
bind=Alt+SHIFT,2,tag,2
bind=Alt+SHIFT,3,tag,3

# Switch workspace view
bind=Alt,1,view,1,0
bind=Alt,2,view,2,0
bind=Alt,3,view,3,0

# --- Window States ---
# Toggle fullscreen mode
bind=SUPER,f,togglefullscreen

# Toggle floating mode (manual window positioning)
bind=SUPER,v,togglefloating

# --- Mouse Controls ---
# Move windows with SUPER + left click
mousebind=SUPER,btn_left,moveresize,curmove

# Resize windows with SUPER + right click
mousebind=SUPER,btn_right,moveresize,curresize

# --- Display Layout ---
# Primary monitor layout (main screen)
monitorrule=name:^DP-2$,width:1920,height:1080,refresh:280,x:0,y:0

# Secondary monitor layout (left screen)
monitorrule=name:^DP-3$,width:1920,height:1080,refresh:144,x:-1920,y:0
