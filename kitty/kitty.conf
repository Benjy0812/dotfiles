# Font
# Sets the primary font to JetBrains Mono
font_family      JetBrains Mono
# Uses the font's built-in bold style
bold_font        auto
# Uses the font's built-in italic style
italic_font      auto
# Sets the font size to 12pt
font_size        12

# terminal apperance
# Adds 10px padding inside the terminal window
window_padding_width 10
# Makes the terminal background 50% transparent
background_opacity 0.5

# Mouse
# Hides the mouse cursor after 1 second of inactivity
mouse_hide_wait 1.0

# Performance
# Stores 10,000 lines of scrollback history
scrollback_lines 10000
# Disables smooth window resizing (snaps to integer steps)
window_resize_step 0
# Reduces input processing delay to 1ms for faster response
input_delay 1
# Sets the delay between screen updates to 10ms (~100 FPS)
repaint_delay 10
# Syncs terminal updates with the monitor's refresh rate
sync_to_monitor yes
