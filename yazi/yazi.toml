[mgr]
ratio = [1, 4, 3]
sort_by = "mtime"
sort_sensitive = false
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "size_and_mtime"
scrolloff = 5

[preview]
wrap = "yes"
tab_size = 4
max_width = 1000
max_height = 800
image_quality = 80

[opener]
edit = [
    { run = "zeditor %s", block = true, for = "unix" },
]
open = [
    { run = "xdg-open %s", desc = "Open" },
]
play = [
    { run = "mpv %s", orphan = true, for = "unix" },
]

[open]
prepend_rules = [
    { url = "*.md", use = "edit" },
    { url = "*.txt", use = "edit" },
]
append_rules = [
    { url = "*", use = "open" },
]

[input]
cursor_blink = true
