# Hyprland Configuration (converted from MangoWM)
# This is the keybinds section - typically placed in ~/.config/hypr/hyprland.conf
# or you can use: include = ~/.config/hypr/keybinds.conf

# Define modifier for easier use
local mainMod = "SUPER"
local altMod = "ALT"

# CORE KEYBINDINGS

# Reload config
hl.bind(mainMod .. " + R", hl.dsp.exec_cmd("hyprctl reload"))

# Kill active window
hl.bind(altMod .. " + Q", hl.dsp.kill_window())

# Quit Hyprland
hl.bind(mainMod .. " + SHIFT + Q", hl.dsp.exit())

# LAUNCHER KEYBINDINGS

# Open terminal (kitty)
hl.bind(altMod .. " + Return", hl.dsp.exec_cmd("kitty"))

# Open launcher/panel
hl.bind(altMod .. " + D", hl.dsp.exec_cmd("noctalia msg panel-toggle launcher"))

# Open terminal with fish shell
hl.bind(altMod .. " + E", hl.dsp.exec_cmd("kitty -e fish -c y"))

# SCREENSHOT

# Screenshot with flameshot
hl.bind(mainMod .. " + SHIFT + S", hl.dsp.exec_cmd("flameshot gui"))

# WORKSPACE NAVIGATION (Alt + Number)

for i = 1, 9 do
    hl.bind(altMod .. " + " .. i, hl.dsp.focus({ workspace = tostring(i) }))
end

# MOVE WINDOW TO WORKSPACE (Alt + Shift + Number)

for i = 1, 9 do
    hl.bind(altMod .. " + SHIFT + " .. i, hl.dsp.window.move_to_workspace(i))
end

# Move to workspace 10 (Alt + Shift + 0)
hl.bind(altMod .. " + SHIFT + 0", hl.dsp.window.move_to_workspace(10))

# WINDOW FOCUS AND NAVIGATION (Arrow Keys)

hl.bind(altMod .. " + left", hl.dsp.focus({ direction = "l" }))
hl.bind(altMod .. " + right", hl.dsp.focus({ direction = "r" }))
hl.bind(altMod .. " + up", hl.dsp.focus({ direction = "u" }))
hl.bind(altMod .. " + down", hl.dsp.focus({ direction = "d" }))

# WINDOW MANAGEMENT

# Toggle fullscreen
hl.bind(mainMod .. " + F", hl.dsp.window.fullscreen())

# Toggle floating
hl.bind(mainMod .. " + SHIFT + F", hl.dsp.window.float({ action = "toggle" }))

# LAYOUT MANAGEMENT

# Note: Hyprland uses different layout names than MangoWM
# You may need to install and configure these layouts separately

# Master layout
hl.bind(mainMod .. " + 1", hl.dsp.exec_cmd("hyprctl dispatch layoutmsg \"preselect l\""))

# Fair/Even split layout
hl.bind(mainMod .. " + 2", hl.dsp.exec_cmd("hyprctl dispatch layoutmsg \"togglesplit\""))

# Vertical layout
hl.bind(mainMod .. " + 3", hl.dsp.exec_cmd("hyprctl dispatch layoutmsg \"preselect d\""))

# MEDIA AND CONTROL

hl.bind(altMod .. " + space", hl.dsp.exec_cmd("playerctl play-pause"))

# Additional media controls (optional)
# hl.bind("XF86AudioPlay", hl.dsp.exec_cmd("playerctl play-pause"), { locked = true })
# hl.bind("XF86AudioPrev", hl.dsp.exec_cmd("playerctl previous"), { locked = true })
# hl.bind("XF86AudioNext", hl.dsp.exec_cmd("playerctl next"), { locked = true })

# MOUSE BINDINGS
# Note: In Hyprland, mouse button codes are:
# LMB (Left Mouse Button) = 272
# RMB (Right Mouse Button) = 273
# MMB (Middle Mouse Button) = 274

# Alt + LMB: Move window
hl.bind(altMod .. " + mouse:272", hl.dsp.window.drag(), { mouse = true })

# Alt + RMB: Resize window
hl.bind(altMod .. " + mouse:273", hl.dsp.window.resize(), { mouse = true })

# Alt + MMB: Toggle floating
hl.bind(altMod .. " + mouse:274", hl.dsp.window.float({ action = "toggle" }))
